<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danielzinho</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Georgia', serif;
    background: url('background.png') no-repeat center center/cover;
    height: 100vh;
    overflow: hidden;
    background-position: center;
    background-size: cover;
}

.item {
    position: absolute;
    cursor: pointer;
    transition: transform 0.3s;
}

.item:hover {
    transform: scale(1.05);
}

#bible {
    left: 25%;
    top: 30%;
    width: 40vw; 
    max-width: 500px;
}

#cross {
    right: 20%;
    top: 1%;
    width: 15vw;
    max-width: 100px;
}

#speaker {
    right: 35%;
    top: 68%;
    width: 20vw;
    max-width: 220px;
}

.playing {
    animation: vibrar 0.5s infinite;
}

@keyframes vibrar {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    50% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
    100% { transform: rotate(0deg); }
}


.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
}

#bibleOpen {
    background: url('biblea.jpg') no-repeat center/contain;
}

#paperScreen {
    background: url('paper.png') no-repeat center/contain;
}

#envelope {
    position: absolute;
    left: 30%;
    top: 40%;
    width: 25vw;
    max-width: 240px;
}

#texto {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    white-space: pre-line;

    width: 60%;
    max-width: 500px;

    height: 55%;
    overflow-y: auto;

    padding: 10px 15px;

    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.6;

    text-align: left;
    color: #222;
}

#popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 90%;
    max-width: 400px;

    height: 300px; /* define altura */
    padding: 40px 25px;

    background: url('popup.jpg') no-repeat center/contain;

    display: none;
    text-align: center;

    overflow-y: auto; /* resolve vazamento */
}

#popup p {
    font-size: 14px;
    line-height: 1.5;
    margin: 0;
}

button {
    margin-top: 15px;
    padding: 10px 25px;
    font-size: 16px;
    font-family: 'Georgia', serif;
    color: #fff;
    background: linear-gradient(135deg, #8b5e3c, #c9a27e);
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

button:active {
    transform: scale(0.95);
}

.btn-fechar {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    
    padding: 12px 30px;
    font-size: 16px;
    font-family: 'Georgia', serif;
    color: #fff;

    background: linear-gradient(135deg, #8b5e3c, #c9a27e);
    border: none;
    border-radius: 30px;

    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);

    transition: all 0.3s ease;
}

.btn-fechar:hover {
    transform: translateX(-50%) scale(1.08);
}

.btn-fechar:active {
    transform: translateX(-50%) scale(0.95);
}

@media (max-width: 600px) {
    .btn-fechar {
        font-size: 14px;
        padding: 10px 25px;
        bottom: 20px;
    }
}

@media (max-width: 600px) {

    #bible {
        left: 15%;
        top: 45%;
        width: 60vw;
    }

    #cross {
        right: 5%;
        top: 10%;
        width: 20vw;
    }

    #speaker {
        right: 5%;
        top: 70%;
        width: 25vw;
    }

    #envelope {
        left: 25%;
        top: 45%;
        width: 40vw;
    }

    #texto {
        width: 75%;
        height: 50%;
        font-size: 18px;
    }

    .btn-fechar {
        bottom: 60px;
    }
}

</style>
</head>

<body>

<img src="biblef.jpg" id="bible" class="item">
<img src="cruz.jpg" id="cross" class="item">
<img src="speaker.jpg" id="speaker" class="item">

<div id="bibleOpen" class="screen">
    <div class="back" onclick="voltar()">←</div>
    <img src="envelope.jpg" id="envelope">
    <button class="btn-fechar" onclick="fecharTudo()">Voltar</button>
</div>

<div id="paperScreen" class="screen">
    <div class="back" onclick="voltarBible()">←</div>
    <div id="texto"></div>
    <button class="btn-fechar" onclick="fecharTudo()">Voltar</button>
</div>

<div id="popup">
    <p>
    ³⁸ Porque estou certo de que, nem a morte, nem a vida, nem os anjos, nem os principados, nem as potestades, nem o presente, nem o porvir,<br>
    ³⁹ Nem a altura, nem a profundidade, nem alguma outra criatura nos poderá separar do amor de Deus, que está em Cristo Jesus nosso Senhor.<br>
    <b>Romanos 8:38:39</b>
    </p>
    <br>
    <button onclick="fecharPopup()">Fechar</button>
</div>

<audio id="audio" src="musica1.mp3"></audio>

<script>
const bible = document.getElementById('bible');
const bibleOpen = document.getElementById('bibleOpen');
const envelope = document.getElementById('envelope');
const paperScreen = document.getElementById('paperScreen');
const texto = document.getElementById('texto');
const cross = document.getElementById('cross');
const popup = document.getElementById('popup');
const speaker = document.getElementById('speaker');
const audio = document.getElementById('audio');

let tocando = false;

bible.onclick = () => {
    bibleOpen.style.display = "block";
}

envelope.onclick = () => {
    bibleOpen.style.display = "none";
    paperScreen.style.display = "block";
    digitarTexto();
}

function fecharTudo() {
    bibleOpen.style.display = "none";
    paperScreen.style.display = "none";
}

cross.onclick = () => {
    popup.style.display = "block";
}

function fecharPopup() {
    popup.style.display = "none";
}

speaker.onclick = () => {
    if (!tocando) {
        audio.play();
        speaker.classList.add("playing");
        tocando = true;
    } else {
        audio.pause();
        speaker.classList.remove("playing");
        tocando = false;
    }
}

let digitando = false;

function digitarTexto() {
    if (digitando) return; 
    digitando = true;

    const mensagem = `Assim, eles já não são dois, mas sim uma só carne. Portanto, o que Deus uniu, ninguém separe.
Mateus 19:6

É estranho escrever isso, mas eu sinto que já te conhecia antes de te conhecer… Eu já falava de você com Deus mesmo sem saber quem você era, já pedia por alguém assim, alguém que trouxesse paz pro meu coração só de existir. Eu sonhava, sem rosto, sem nome… mas com a sensação certa. Então você apareceu, e não foi surpresa… foi reconhecimento. Como se dentro de mim algo dissesse: “é você…”. Uma das coisas que mais mexe comigo são as vezes que a gente orou junto e eu te vi orando… aquilo me fez sentir que não era só sentimento, era propósito. Ali eu comecei a acreditar de verdade que talvez a gente tenha sido predestinado por Deus pra caminhar junto, lado a lado, vivendo aquilo que Ele planejou pra nós.
Eu só peço que Deus continue sendo sempre o centro da gente, porque eu não quero viver nada com você que não venha dEle… não quero que seja diferente. Quero que saiba que, enquanto eu existir, você sempre vai ter alguém orando por você, pela sua vida e pelo propósito de Deus nela. Antes mesmo de te encontrar, eu já escrevia o seu nome… doideira demais, sem entender o porquê… mas hoje eu entendo.
E quero que nos momentos difíceis, a gente seja apoio um pro outro, que a gente se segure e não solte… porque você é meu companheiro, meu melhor amigo, e alguém que eu escolho todos os dias.`;

    texto.innerHTML = ""; 
    let i = 0;

    function escrever() {
        if (i < mensagem.length) {
            texto.innerHTML += mensagem.charAt(i);
            i++;
            setTimeout(escrever, 20);
        } else {
            digitando = false; 
        }
    }

    escrever();
}
</script>

</body>
</html>
